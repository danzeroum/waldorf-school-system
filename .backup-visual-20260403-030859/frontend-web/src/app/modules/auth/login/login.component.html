<div class="min-h-screen flex items-center justify-center bg-waldorf-cream">
  <mat-card class="w-full max-w-md p-8 shadow-lg">

    <mat-card-header class="mb-6">
      <div class="flex items-center gap-3">
        <mat-icon class="text-waldorf-green" style="font-size:2.5rem;width:2.5rem;height:2.5rem">school</mat-icon>
        <div>
          <mat-card-title class="text-2xl font-bold text-waldorf-green">Escola Waldorf</mat-card-title>
          <mat-card-subtitle>Sistema de Gestão Escolar</mat-card-subtitle>
        </div>
      </div>
    </mat-card-header>

    <mat-card-content>

      @if (errorMessage) {
        <div class="bg-red-50 border border-red-300 text-red-700 rounded-md px-4 py-3 mb-4 text-sm"
             role="alert">
          <span class="font-medium">{{ errorMessage }}</span>
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4" novalidate>

        <!-- E-mail -->
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>E-mail</mat-label>
          <input matInput
                 id="email"
                 type="email"
                 formControlName="username"
                 placeholder="seu@email.com"
                 autocomplete="email"
                 [attr.disabled]="loading ? true : null" />
          <mat-icon matPrefix>email</mat-icon>
          @if (emailInvalid) {
            <mat-error>Informe um e-mail válido</mat-error>
          }
        </mat-form-field>

        <!-- Senha -->
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Senha</mat-label>
          <input matInput
                 id="senha"
                 [type]="showPassword ? 'text' : 'password'"
                 formControlName="password"
                 placeholder="Sua senha"
                 autocomplete="current-password"
                 [attr.disabled]="loading ? true : null" />
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button"
                  (click)="togglePassword()"
                  [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'">
            <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          @if (senhaInvalid) {
            <mat-error>Mínimo 6 caracteres</mat-error>
          }
        </mat-form-field>

        <!-- Lembrar-me -->
        <mat-checkbox formControlName="rememberMe" color="primary" [disabled]="loading">
          Lembrar-me neste dispositivo
        </mat-checkbox>

        <!-- Submit -->
        <button mat-raised-button color="primary" type="submit"
                [disabled]="loading || form.invalid"
                class="h-12 text-base font-semibold mt-2">
          @if (loading) {
            <mat-progress-spinner diameter="20" mode="indeterminate"
              class="inline-block mr-2"></mat-progress-spinner>
          }
          {{ loading ? 'Autenticando...' : 'Entrar' }}
        </button>

      </form>
    </mat-card-content>

    <mat-card-footer class="p-4 text-center text-sm text-gray-500">
      Esqueceu sua senha?
      <a routerLink="/auth/recuperar" class="text-waldorf-green font-medium hover:underline ml-1">
        Recuperar acesso
      </a>
    </mat-card-footer>

  </mat-card>
</div>
