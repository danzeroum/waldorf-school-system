spring:
  application:
    name: waldorf-system

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:waldorf_db}?useSSL=${DB_USE_SSL:true}&requireSSL=${DB_USE_SSL:true}&allowPublicKeyRetrieval=${DB_ALLOW_PUBKEY:false}&serverTimezone=America/Sao_Paulo
    username: ${DB_USER:waldorf}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

# Origens CORS permitidas (lista separada por vírgula via env)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

app:
  # Swagger público apenas fora de produção (sobrescrever em prod: APP_SWAGGER_PUBLIC=false)
  swagger:
    public: ${APP_SWAGGER_PUBLIC:true}
  # Cookies de autenticação (HttpOnly). Em produção exigem HTTPS (secure=true).
  cookie:
    secure: ${APP_COOKIE_SECURE:true}
    same-site: ${APP_COOKIE_SAME_SITE:Strict}
  # Chave para criptografia de dados sensíveis em repouso (CPF). NÃO usar default em produção.
  encryption:
    key: ${APP_ENCRYPTION_KEY:}
  rate-limit:
    login:
      max-attempts: ${LOGIN_RATE_LIMIT_MAX:10}
      window-seconds: ${LOGIN_RATE_LIMIT_WINDOW:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-}]"
  level:
    com.waldorf: INFO
