spring:
  application:
    name: waldorf-school-system

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:waldorf_db}?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
    username: ${DB_USER:waldorf}
    password: ${DB_PASS:waldorf123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:waldorf-jwt-secret-key-change-in-production-256bits}
  expiration: 86400000        # 24h em ms
  refresh-expiration: 604800000 # 7 dias em ms

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
  show-actuator: false

logging:
  level:
    com.waldorf: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
