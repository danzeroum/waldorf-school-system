spring:
  datasource:
    url: jdbc:h2:mem:waldorf_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

jwt:
  secret: test-secret-key-waldorf-256bits-testing-only
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.waldorf: DEBUG
    org.springframework.security: DEBUG
