services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: waldorf-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CHANGE_ME}
      MYSQL_DATABASE: ${DB_NAME:-waldorf_db}
      MYSQL_USER: ${DB_USER:-waldorf_user}
      MYSQL_PASSWORD: ${DB_PASS:-CHANGE_ME}
    # SEM ports expostas ao host — acesso apenas interno
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - waldorf-internal
    command: --log_bin_trust_function_creators=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: waldorf-redis
    volumes:
      - redis_data:/data
    networks:
      - waldorf-internal
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: waldorf-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:-waldorf}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASS:-CHANGE_ME}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - waldorf-internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO Object Storage (S3 compatible)
  minio:
    image: minio/minio:latest
    container_name: waldorf-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-waldorf_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-CHANGE_ME}
    volumes:
      - minio_data:/data
    networks:
      - waldorf-internal
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend Spring Boot
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: waldorf-backend
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-waldorf_db}
      DB_USER: ${DB_USER:-waldorf_user}
      DB_PASS: ${DB_PASS:-CHANGE_ME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: ${RABBIT_USER:-waldorf}
      RABBIT_PASS: ${RABBIT_PASS:-CHANGE_ME}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_USE_256_BITS_MIN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-dev-key-change-in-production}
      SPRING_JPA_OPEN_IN_VIEW: "false"
    # Sem host-port: federado ao ingress central (waldorf-backend:8080 -> gateway TLS)
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - waldorf-internal
      - btv-prod-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Frontend Angular
  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: waldorf-frontend
    # Sem host-port: federado ao ingress central (waldorf-frontend:80 -> gateway TLS)
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - waldorf-internal
      - btv-prod-net

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  # Rede interna isolada — apenas comunicação entre os serviços do projeto
  waldorf-internal:
    driver: bridge

  # Rede externa compartilhada com o ingress central da VPS
  btv-prod-net:
    external: true
    name: btv-prod-net
