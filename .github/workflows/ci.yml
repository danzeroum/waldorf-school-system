name: CI — Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend (Java 21 + Maven)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        working-directory: backend
        run: chmod +x mvnw

      - name: Build & Test (H2 in-memory, perfil test)
        working-directory: backend
        run: ./mvnw -B verify --no-transfer-progress -P test || mvn -B verify --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: ci-jwt-secret-key-waldorf-for-testing-256bits-ok

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/
          if-no-files-found: ignore

  frontend-lint:
    name: Frontend Angular (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-web/package.json

      - name: Install dependencies
        working-directory: frontend-web
        run: npm install --legacy-peer-deps

      - name: Lint (se eslint configurado)
        working-directory: frontend-web
        run: npm run lint -- --max-warnings=100 || echo "Lint com avisos aceitáveis, continuando..."
        continue-on-error: true

      - name: Build production
        working-directory: frontend-web
        run: npm run build -- --configuration production
