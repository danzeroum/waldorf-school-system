name: CI — Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend (Java 21 + H2)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # mvnw nao existe — usa mvn direto (igual ao ci-backend.yml que ja funciona)
      - name: Build & Test (H2 in-memory)
        working-directory: backend
        run: mvn -B verify --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: ci-jwt-secret-waldorf-256bits-testing-only-ok

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-ci
          path: backend/target/surefire-reports/
          if-no-files-found: ignore

  frontend-build:
    name: Frontend Angular (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend-web
        run: npm install --legacy-peer-deps

      - name: Lint (continue on warnings)
        working-directory: frontend-web
        run: npm run lint -- --max-warnings=200 || echo "Lint OK com avisos"
        continue-on-error: true

      - name: Build production
        working-directory: frontend-web
        run: npm run build -- --configuration production
