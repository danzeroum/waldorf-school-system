name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Backend (Java 21 + H2)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run tests
        working-directory: ./backend
        run: mvn -B clean test --no-transfer-progress 2>&1 | tee /tmp/maven-test.log; exit ${PIPESTATUS[0]}
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: test-secret-waldorf-at-least-256bits-for-hmac-sha-ok

      - name: Show last 200 lines of Maven log on failure
        if: failure()
        run: tail -200 /tmp/maven-test.log || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/
          if-no-files-found: ignore

  build:
    name: Build Backend JAR
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build JAR (skip tests)
        working-directory: ./backend
        run: mvn -B clean package -DskipTests --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: test-secret-waldorf-at-least-256bits-for-hmac-sha-ok

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: waldorf-backend-jar
          path: backend/target/*.jar
          retention-days: 7
