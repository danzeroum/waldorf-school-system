name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Backend (Java 21 + H2)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Make mvnw executable
        working-directory: ./backend
        run: chmod +x mvnw

      - name: Run tests
        working-directory: ./backend
        run: ./mvnw -B clean test --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: ci-jwt-secret-waldorf-256bits-testing-only-ok

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/
          if-no-files-found: ignore

  build:
    name: Build Backend JAR
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Make mvnw executable
        working-directory: ./backend
        run: chmod +x mvnw

      - name: Build JAR (skip tests)
        working-directory: ./backend
        run: ./mvnw -B clean package -DskipTests --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: waldorf-backend-jar
          path: backend/target/*.jar
          retention-days: 7
