<div class="flex h-screen overflow-hidden bg-waldorf-cream-50">

  <!-- Sidebar -->
  <aside
    class="sidebar-container flex-shrink-0 bg-white border-r border-waldorf-cream-200
           shadow-waldorf-sm overflow-y-auto overflow-x-hidden"
    [class.sidebar-expanded]="sidebarAberta()"
    [class.sidebar-collapsed]="!sidebarAberta()"
    >
    <wld-sidebar [collapsed]="!sidebarAberta()"></wld-sidebar>
  </aside>

  <!-- Overlay mobile (fecha sidebar ao clicar fora) -->
  @if (sidebarAberta()) {
    <div
      class="sidebar-overlay lg:hidden"
      (click)="toggleSidebar()"
    ></div>
  }

  <!-- Área principal -->
  <div class="flex flex-col flex-1 overflow-hidden min-w-0">

    <!-- Header -->
    <header class="bg-white border-b border-waldorf-cream-200 shadow-waldorf-sm z-10">
      <wld-header
        [sidebarAberta]="sidebarAberta()"
        (toggleSidebar)="toggleSidebar()"
      ></wld-header>
    </header>

    <!-- Conteúdo (router-outlet) -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
