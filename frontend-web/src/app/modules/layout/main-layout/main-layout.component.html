<div class="flex h-screen overflow-hidden bg-waldorf-cream-50">

  <!-- Sidebar -->
  <aside
    [class]="sidebarAberta()
      ? 'w-64 transition-all duration-300 ease-in-out'
      : 'w-16 transition-all duration-300 ease-in-out'"
    class="flex-shrink-0 bg-white border-r border-waldorf-cream-200 shadow-waldorf-sm
           overflow-y-auto overflow-x-hidden"
  >
    <wld-sidebar [collapsed]="!sidebarAberta()"></wld-sidebar>
  </aside>

  <!-- Área principal -->
  <div class="flex flex-col flex-1 overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-waldorf-cream-200 shadow-waldorf-sm z-10">
      <wld-header
        [sidebarAberta]="sidebarAberta()"
        (toggleSidebar)="toggleSidebar()"
      ></wld-header>
    </header>

    <!-- Conteúdo (router-outlet) -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
