<div class="space-y-5 animate-fade-in-up">

  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
    <h1 class="text-2xl font-serif text-waldorf-gray-900">Parcelas</h1>
    <div class="flex gap-2 flex-wrap">
      <button *ngFor="let s of ['', 'PENDENTE', 'VENCIDA', 'PAGA']"
              (click)="filtroStatus.set(s); carregar()"
              [class]="filtroStatus() === s ? 'btn-primary text-sm' : 'btn-ghost text-sm'">
        {{ s || 'Todas' }}
      </button>
    </div>
  </div>

  <div class="card p-0 overflow-hidden">
    <table class="w-full">
      <thead>
        <tr>
          <th class="table-header text-left">Aluno</th>
          <th class="table-header text-left hidden sm:table-cell">Descrição</th>
          <th class="table-header text-right">Valor</th>
          <th class="table-header text-left hidden md:table-cell">Vencimento</th>
          <th class="table-header text-left">Status</th>
          <th class="table-header text-right">Ação</th>
        </tr>
      </thead>
      <tbody>
        <ng-container *ngIf="carregando()">
          <tr *ngFor="let i of [1,2,3,4,5]" class="table-row-hover">
            <td class="table-cell"><div class="skeleton h-4 w-36"></div></td>
            <td class="table-cell hidden sm:table-cell"><div class="skeleton h-4 w-32"></div></td>
            <td class="table-cell"><div class="skeleton h-4 w-20 ml-auto"></div></td>
            <td class="table-cell hidden md:table-cell"><div class="skeleton h-4 w-24"></div></td>
            <td class="table-cell"><div class="skeleton h-5 w-16 rounded-full"></div></td>
            <td class="table-cell"><div class="skeleton h-8 w-16 ml-auto rounded"></div></td>
          </tr>
        </ng-container>

        <ng-container *ngIf="!carregando()">
          <tr *ngFor="let p of parcelas()" class="table-row-hover">
            <td class="table-cell font-medium text-waldorf-gray-800">{{ p.alunoNome ?? '—' }}</td>
            <td class="table-cell text-sm text-waldorf-gray-500 hidden sm:table-cell">{{ p.descricao }}</td>
            <td class="table-cell text-right font-semibold text-waldorf-gray-800">{{ formatarMoeda(p.valor) }}</td>
            <td class="table-cell hidden md:table-cell text-sm"
                [class.text-red-500]="p.status === 'VENCIDA'"
                [class.text-waldorf-gray-500]="p.status !== 'VENCIDA'">
              {{ p.dataVencimento | date:'dd/MM/yyyy' }}
            </td>
            <td class="table-cell">
              <span [class]="'badge ' + (p.status | statusParcela:'css')">{{ p.status | statusParcela }}</span>
            </td>
            <td class="table-cell text-right">
              <button
                *ngIf="p.status === 'PENDENTE' || p.status === 'VENCIDA'"
                (click)="abrirBaixa(p.id, p.valor)"
                class="btn-primary text-xs flex items-center gap-1 ml-auto"
              >
                <span class="material-icons text-sm">payments</span>
                Baixar
              </button>
              <span *ngIf="p.status === 'PAGA'" class="text-xs text-waldorf-gray-400 flex items-center gap-1 ml-auto justify-end">
                <span class="material-icons text-sm text-green-500">check_circle</span>
                {{ p.dataPagamento | date:'dd/MM' }}
              </span>
            </td>
          </tr>
          <tr *ngIf="parcelas().length === 0">
            <td colspan="6" class="py-12 text-center text-waldorf-gray-400">Nenhuma parcela encontrada</td>
          </tr>
        </ng-container>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal de baixa de pagamento -->
<div *ngIf="baixaAberta() !== null"
     class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4"
     (click)="fecharBaixa()">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 space-y-4" (click)="$event.stopPropagation()">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-semibold text-waldorf-gray-800">Registrar Pagamento</h2>
      <button (click)="fecharBaixa()" class="btn-icon">
        <span class="material-icons">close</span>
      </button>
    </div>

    <form [formGroup]="formBaixa" class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="form-label">Valor Pago (R$) *</label>
          <input type="number" formControlName="valorPago" step="0.01" class="form-input">
        </div>
        <div>
          <label class="form-label">Data do Pagamento *</label>
          <input type="date" formControlName="dataPagamento" class="form-input">
        </div>
      </div>
      <div>
        <label class="form-label">Forma de Pagamento *</label>
        <select formControlName="formaPagamento" class="form-input">
          <option *ngFor="let f of formasPagamento" [value]="f">{{ f }}</option>
        </select>
      </div>
      <div>
        <label class="form-label">Observação</label>
        <input type="text" formControlName="observacao" placeholder="Opcional" class="form-input">
      </div>
    </form>

    <div class="flex justify-end gap-3 pt-2">
      <button (click)="fecharBaixa()" class="btn-secondary">Cancelar</button>
      <button (click)="confirmarBaixa()" [disabled]="salvandoBaixa()" class="btn-primary flex items-center gap-2">
        <span *ngIf="salvandoBaixa()" class="material-icons animate-spin text-base">refresh</span>
        {{ salvandoBaixa() ? 'Salvando...' : 'Confirmar Pagamento' }}
      </button>
    </div>
  </div>
</div>
