<div class="space-y-5 animate-fade-in-up">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
    <h1 class="text-2xl font-serif text-waldorf-gray-900">Contratos</h1>
    <button (click)="novoContrato()" class="btn-primary flex items-center gap-2">
      <span class="material-icons text-base">add</span>
      Novo Contrato
    </button>
  </div>

  <!-- Busca -->
  <div class="relative">
    <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-waldorf-gray-400 text-base pointer-events-none">search</span>
    <input type="search" [formControl]="buscaCtrl" placeholder="Buscar por nome do aluno..."
           class="form-input pl-10">
  </div>

  <!-- Chips de status com contagens -->
  <div class="flex gap-2 flex-wrap">
    <button
      *ngFor="let chip of chips"
      (click)="filtroStatus.set(chip.status)"
      [class]="filtroStatus() === chip.status ? 'btn-primary text-sm' : 'btn-ghost text-sm'"
    >
      {{ chip.label }} · {{ chip.status ? (contagemPorStatus()[chip.status] ?? 0) : contagemPorStatus().total }}
    </button>
  </div>

  <!-- Tabela -->
  <div class="card p-0 overflow-hidden">
    <table class="w-full">
      <thead>
        <tr>
          <th class="table-header text-left">Aluno</th>
          <th class="table-header text-left hidden sm:table-cell">Turma</th>
          <th class="table-header text-right hidden md:table-cell">Mensalidade</th>
          <th class="table-header text-left hidden lg:table-cell">Parcelas</th>
          <th class="table-header text-left">Status</th>
          <th class="table-header text-right">Ação</th>
        </tr>
      </thead>
      <tbody>

        <!-- Skeleton -->
        <ng-container *ngIf="carregando()">
          <tr *ngFor="let i of [1,2,3]" class="table-row-hover">
            <td class="table-cell"><div class="skeleton h-4 w-40"></div></td>
            <td class="table-cell hidden sm:table-cell"><div class="skeleton h-4 w-24"></div></td>
            <td class="table-cell hidden md:table-cell"><div class="skeleton h-4 w-20 ml-auto"></div></td>
            <td class="table-cell hidden lg:table-cell"><div class="skeleton h-4 w-28"></div></td>
            <td class="table-cell"><div class="skeleton h-5 w-20 rounded-full"></div></td>
            <td class="table-cell"><div class="skeleton h-8 w-16 ml-auto rounded"></div></td>
          </tr>
        </ng-container>

        <!-- Dados -->
        <ng-container *ngIf="!carregando()">
          <tr
            *ngFor="let c of contratosFiltrados()"
            class="table-row-hover cursor-pointer"
            (click)="verContrato(c.id)"
            [style.background-color]="c.status === 'INADIMPLENTE' ? '#FDF6F4' : null"
          >
            <!-- Aluno -->
            <td
              class="table-cell font-medium text-waldorf-gray-800"
              [class.border-l-4]="c.status === 'INADIMPLENTE'"
              [class.border-l-red-500]="c.status === 'INADIMPLENTE'"
            >{{ c.alunoNome }}</td>

            <!-- Turma -->
            <td class="table-cell hidden sm:table-cell">
              <span class="badge badge-info">{{ c.turmaNome }}</span>
            </td>

            <!-- Mensalidade -->
            <td class="table-cell text-right hidden md:table-cell font-mono font-semibold text-waldorf-gray-700">
              {{ formatarMoeda(c.valorMensalidade) }}
            </td>

            <!-- Progresso de parcelas -->
            <td class="table-cell hidden lg:table-cell">
              <div class="flex items-center gap-2">
                <div class="flex-1 h-1.5 rounded-full bg-waldorf-cream-200 overflow-hidden min-w-[60px]">
                  <div
                    class="h-full rounded-full transition-all"
                    [class]="c.status === 'INADIMPLENTE' ? 'bg-red-400' : 'bg-waldorf-green-400'"
                    [style.width.%]="progressoParcelas(c)"
                  ></div>
                </div>
                <span class="text-xs text-waldorf-gray-500 font-mono whitespace-nowrap">
                  {{ c.parcelasPagas ?? 0 }}/{{ c.totalParcelas }}
                </span>
              </div>
            </td>

            <!-- Status -->
            <td class="table-cell">
              <span [class]="'badge ' + (c.status | statusContrato:'css')">{{ c.status | statusContrato }}</span>
            </td>

            <!-- Ação -->
            <td class="table-cell text-right">
              <button class="btn-ghost text-xs">Ver</button>
            </td>
          </tr>

          <!-- Empty state -->
          <tr *ngIf="contratosFiltrados().length === 0">
            <td colspan="6" class="py-12 text-center">
              <span class="material-icons text-4xl text-waldorf-gray-300 block mb-2">description</span>
              <p class="text-waldorf-gray-400">Nenhum contrato encontrado</p>
            </td>
          </tr>
        </ng-container>

      </tbody>
    </table>
  </div>

</div>
