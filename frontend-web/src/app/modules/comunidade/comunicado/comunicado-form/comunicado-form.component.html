<div class="space-y-5 animate-fade-in-up max-w-2xl">
  <div class="flex items-center gap-3">
    <a routerLink="/comunidade/comunicados" class="btn-ghost p-2">
      <span class="material-icons">arrow_back</span>
    </a>
    <div>
      <h1 class="text-2xl font-serif text-waldorf-gray-900">Novo Comunicado</h1>
      <p class="text-sm text-waldorf-gray-500">Envie um comunicado para a comunidade escolar</p>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="salvar()" class="card space-y-4">
    <div>
      <label class="label">Destinatários</label>
      <select formControlName="destinatarios" class="input w-full">
        <option value="TODOS">Toda a comunidade</option>
        <option value="RESPONSAVEIS">Apenas responsáveis</option>
        <option value="PROFESSORES">Apenas professores</option>
        <option value="TURMA">Turma específica</option>
      </select>
    </div>
    <div>
      <label class="label">Assunto <span class="text-red-500">*</span></label>
      <input formControlName="assunto" type="text" class="input w-full" placeholder="Ex: Reunião de pais — Classe 3" />
      <p *ngIf="form.get('assunto')?.touched && form.get('assunto')?.invalid" class="text-xs text-red-500 mt-1">Assunto obrigatório (mín. 5 caracteres)</p>
    </div>
    <div>
      <label class="label">Mensagem <span class="text-red-500">*</span></label>
      <textarea formControlName="corpo" rows="5" class="input w-full resize-none" placeholder="Escreva o conteúdo do comunicado..."></textarea>
      <p *ngIf="form.get('corpo')?.touched && form.get('corpo')?.invalid" class="text-xs text-red-500 mt-1">Mensagem obrigatória (mín. 10 caracteres)</p>
    </div>
    <p *ngIf="erro" class="text-sm text-red-600">{{ erro }}</p>
    <div class="flex gap-3 pt-2">
      <button type="submit" [disabled]="salvando" class="btn-primary flex items-center gap-2">
        <span *ngIf="salvando" class="material-icons animate-spin text-base">refresh</span>
        Publicar comunicado
      </button>
      <a routerLink="/comunidade/comunicados" class="btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
