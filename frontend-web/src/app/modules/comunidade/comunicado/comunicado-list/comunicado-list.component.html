<div class="space-y-5 animate-fade-in-up">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-serif text-waldorf-gray-900">Comunicados</h1>
    <button (click)="novoComunicado()" class="btn-primary flex items-center gap-2">
      <span class="material-icons text-base">send</span> Novo Comunicado
    </button>
  </div>

  <div *ngIf="carregando()" class="space-y-3">
    <div *ngFor="let i of [1,2]" class="card space-y-2 animate-pulse">
      <div class="skeleton h-5 w-1/2"></div>
      <div class="skeleton h-4 w-1/3"></div>
    </div>
  </div>

  <div *ngIf="!carregando() && comunicados().length === 0" class="card text-center py-14">
    <span class="material-icons text-4xl text-waldorf-gray-300">mail_outline</span>
    <p class="text-waldorf-gray-500 mt-2">Nenhum comunicado enviado</p>
    <button (click)="novoComunicado()" class="btn-primary mt-4 text-sm">Criar primeiro comunicado</button>
  </div>

  <div class="space-y-3" *ngIf="!carregando() && comunicados().length > 0">
    <div *ngFor="let c of comunicados()" class="card space-y-3">
      <div class="flex items-start justify-between gap-3">
        <div>
          <h3 class="font-semibold text-waldorf-gray-800">{{ c.assunto }}</h3>
          <p class="text-xs text-waldorf-gray-500 mt-0.5">
            {{ c.dataEnvio | date:'dd/MM/yyyy HH:mm' }} &bull; {{ c.autorNome }}
          </p>
        </div>
        <div class="flex gap-2 flex-shrink-0">
          <span class="badge badge-info">{{ c.destinatarios }}</span>
          <span *ngIf="c.turmaNome" class="badge badge-success">{{ c.turmaNome }}</span>
        </div>
      </div>
      <p class="text-sm text-waldorf-gray-600 line-clamp-2">{{ c.corpo }}</p>
      <div *ngIf="c.totalDestinatarios" class="flex items-center gap-3">
        <div class="flex-1 h-1.5 bg-waldorf-cream-200 rounded-full overflow-hidden">
          <div class="h-full bg-waldorf-green-400 rounded-full" [style.width.%]="taxaLeitura(c)"></div>
        </div>
        <span class="text-xs text-waldorf-gray-500">
          {{ c.totalLidos }}/{{ c.totalDestinatarios }} leram ({{ taxaLeitura(c) }}%)
        </span>
      </div>
    </div>
  </div>
</div>
