<div class="space-y-5 animate-fade-in-up">

  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
    <div>
      <h1 class="text-2xl font-serif text-waldorf-gray-900">Turmas</h1>
      <p class="text-sm text-waldorf-gray-500 mt-0.5">Ano Letivo {{ anoLetivo() }}</p>
    </div>
    <div class="flex gap-2">
      <select
        [value]="anoLetivo()"
        (change)="anoLetivo.set(+($event.target as HTMLSelectElement).value); carregar()"
        class="form-input w-32"
      >
        <option [value]="2025">2025</option>
        <option [value]="2026">2026</option>
        <option [value]="2027">2027</option>
      </select>
      <button class="btn-primary flex items-center gap-2">
        <span class="material-icons text-base">add</span>
        Nova Turma
      </button>
    </div>
  </div>

  <!-- Grid de cards -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

    <!-- Skeleton -->
    <ng-container *ngIf="carregando()">
      <div *ngFor="let i of [1,2,3,4,5,6]" class="card space-y-3">
        <div class="skeleton h-6 w-3/4"></div>
        <div class="skeleton h-4 w-1/2"></div>
        <div class="skeleton h-4 w-1/3"></div>
      </div>
    </ng-container>

    <!-- Cards de turma -->
    <ng-container *ngIf="!carregando()">
      <div
        *ngFor="let turma of turmas()"
        class="card card-hover cursor-pointer group"
        (click)="verTurma(turma.id)"
      >
        <!-- Cabeçalho do card -->
        <div class="flex items-start justify-between mb-3">
          <div class="w-10 h-10 bg-waldorf-green-100 rounded-xl flex items-center justify-center">
            <span class="material-icons text-waldorf-green-600">school</span>
          </div>
          <span [class]="turma.situacao === 'ATIVA'
            ? 'badge badge-success'
            : turma.situacao === 'PLANEJADA'
            ? 'badge badge-warning'
            : 'badge badge-neutral'">
            {{ turma.situacao | titlecase }}
          </span>
        </div>

        <h3 class="font-semibold text-waldorf-gray-800 text-lg">{{ turma.nome }}</h3>

        <p class="text-sm text-waldorf-gray-500 mt-1" *ngIf="turma.professorRegente">
          <span class="material-icons text-xs align-middle mr-1">person</span>
          {{ turma.professorRegente.nomeCompleto }}
        </p>

        <div class="flex items-center justify-between mt-3 pt-3 border-t border-waldorf-cream-100">
          <span class="text-sm text-waldorf-gray-600">
            <span class="font-semibold text-waldorf-gray-800">{{ turma.totalAlunos }}</span> alunos
          </span>
          <span class="material-icons text-waldorf-gray-300 group-hover:text-waldorf-green-500 transition-colors">
            arrow_forward
          </span>
        </div>
      </div>
    </ng-container>

    <!-- Empty state -->
    <div *ngIf="!carregando() && turmas().length === 0" class="sm:col-span-2 lg:col-span-3">
      <div class="card text-center py-16">
        <span class="material-icons text-4xl text-waldorf-gray-300">school</span>
        <p class="text-waldorf-gray-500 mt-2">Nenhuma turma cadastrada para {{ anoLetivo() }}</p>
      </div>
    </div>
  </div>
</div>
