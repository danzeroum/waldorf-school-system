<div class="min-h-screen flex items-center justify-center bg-waldorf-cream">
  <mat-card class="w-full max-w-md p-8">
    <mat-card-header>
      <mat-card-title class="text-2xl font-bold text-waldorf-green">Escola Waldorf</mat-card-title>
      <mat-card-subtitle>Sistema de Gestão Escolar</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4 mt-4">
        <mat-form-field appearance="outline">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          <mat-error *ngIf="form.get('email')?.hasError('required')">E-mail obrigatório</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">E-mail inválido</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          <mat-error *ngIf="form.get('password')?.hasError('required')">Senha obrigatória</mat-error>
        </mat-form-field>
        <p *ngIf="error" class="text-red-600 text-sm">{{ error }}</p>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading || form.invalid">
          <mat-progress-spinner *ngIf="loading" diameter="20" mode="indeterminate"></mat-progress-spinner>
          <span *ngIf="!loading">Entrar</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
