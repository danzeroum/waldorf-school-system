<div class="min-h-screen flex items-center justify-center bg-waldorf-cream">
  <mat-card class="w-full max-w-md p-8">
    <mat-card-header class="mb-4">
      <div class="flex flex-col items-center w-full mb-2">
        <span class="text-4xl mb-1">🌱</span>
        <mat-card-title class="text-2xl font-bold text-waldorf-green text-center">
          Escola Waldorf
        </mat-card-title>
        <mat-card-subtitle class="text-center">
          Sistema de Gestão Escolar
        </mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Usuário</mat-label>
          <mat-icon matPrefix class="mr-2 text-gray-400">person</mat-icon>
          <input
            matInput
            type="text"
            formControlName="username"
            autocomplete="username"
            placeholder="seu.usuario"
          />
          <mat-error *ngIf="form.get('username')?.hasError('required')">
            Usuário é obrigatório
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Senha</mat-label>
          <mat-icon matPrefix class="mr-2 text-gray-400">lock</mat-icon>
          <input
            matInput
            type="password"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
          />
          <mat-error *ngIf="form.get('password')?.hasError('required')">
            Senha é obrigatória
          </mat-error>
        </mat-form-field>

        <div *ngIf="error" class="bg-red-50 border border-red-200 rounded p-3">
          <p class="text-red-600 text-sm flex items-center gap-1">
            <mat-icon class="text-sm">error_outline</mat-icon>
            {{ error }}
          </p>
        </div>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="w-full py-2"
          [disabled]="loading || form.invalid"
        >
          <div class="flex items-center justify-center gap-2">
            <mat-progress-spinner
              *ngIf="loading"
              diameter="20"
              mode="indeterminate"
            ></mat-progress-spinner>
            <span>{{ loading ? 'Entrando...' : 'Entrar' }}</span>
          </div>
        </button>

      </form>
    </mat-card-content>

    <mat-card-footer class="text-center mt-4 pb-2">
      <p class="text-xs text-gray-400">
        Sistema de Gestão — Acesso restrito a usuários autorizados
      </p>
    </mat-card-footer>
  </mat-card>
</div>
