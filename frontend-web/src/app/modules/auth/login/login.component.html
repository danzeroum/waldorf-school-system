<div class="min-h-screen flex items-center justify-center bg-waldorf-cream">
  <mat-card class="w-full max-w-md p-8 shadow-lg">
    <mat-card-header class="mb-6">
      <div class="flex items-center gap-3">
        <mat-icon class="text-waldorf-green text-4xl">school</mat-icon>
        <div>
          <mat-card-title class="text-2xl font-bold text-waldorf-green">Escola Waldorf</mat-card-title>
          <mat-card-subtitle>Sistema de Gestão Escolar</mat-card-subtitle>
        </div>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Usuário</mat-label>
          <input
            matInput
            type="text"
            formControlName="username"
            autocomplete="username"
            placeholder="ex: admin"
          />
          <mat-icon matPrefix>person</mat-icon>
          <mat-error *ngIf="usernameCtrl?.hasError('required')">
            Usuário é obrigatório
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Senha</mat-label>
          <input
            matInput
            type="password"
            formControlName="password"
            autocomplete="current-password"
          />
          <mat-icon matPrefix>lock</mat-icon>
          <mat-error *ngIf="passwordCtrl?.hasError('required')">
            Senha é obrigatória
          </mat-error>
        </mat-form-field>

        <mat-error *ngIf="error" class="text-sm mb-2">
          {{ error }}
        </mat-error>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="loading || form.invalid"
          class="h-12 text-base font-semibold"
        >
          <mat-progress-spinner
            *ngIf="loading"
            diameter="20"
            mode="indeterminate"
            class="inline-block mr-2"
          ></mat-progress-spinner>
          <span *ngIf="!loading">Entrar</span>
          <span *ngIf="loading">Autenticando...</span>
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
