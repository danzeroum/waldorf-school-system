<div class="flex items-center justify-between h-14 px-4">

  <!-- Esquerda: toggle sidebar + breadcrumb -->
  <div class="flex items-center gap-3">
    <button (click)="toggle()" class="btn-icon">
      <span class="material-icons">{{ sidebarAberta ? 'menu_open' : 'menu' }}</span>
    </button>
    <nav class="hidden sm:flex items-center gap-1 text-sm text-waldorf-gray-500">
      <span class="font-serif text-waldorf-green-600">Quintal Aroeira</span>
      <span class="material-icons text-base">chevron_right</span>
      <span class="text-waldorf-gray-700 font-medium">Dashboard</span>
    </nav>
  </div>

  <!-- Direita: ações -->
  <div class="flex items-center gap-2">

    <!-- Notificações -->
    <button class="btn-icon relative">
      <span class="material-icons">notifications_none</span>
      <span class="absolute top-1 right-1 w-2 h-2 bg-waldorf-terra-400 rounded-full"></span>
    </button>

    <!-- Avatar + menu -->
    <div class="relative">
      <button
        (click)="toggleMenuUsuario()"
        class="flex items-center gap-2 pl-1 pr-3 py-1 rounded-xl
               hover:bg-waldorf-cream-100 transition-colors duration-200"
      >
        <div class="w-7 h-7 bg-waldorf-green-100 rounded-full flex items-center justify-center">
          <span class="material-icons text-waldorf-green-600 text-base">person</span>
        </div>
        <span class="hidden sm:block text-sm font-medium text-waldorf-gray-700">
          {{ authService.usuario()?.nomeCompleto?.split(' ')[0] || 'Usuário' }}
        </span>
        <span class="material-icons text-waldorf-gray-400 text-base">expand_more</span>
      </button>

      <!-- Dropdown -->
      <div
        *ngIf="menuUsuarioAberto()"
        class="absolute right-0 mt-1 w-52 bg-white rounded-2xl border border-waldorf-cream-200
               shadow-waldorf-md z-50 animate-fade-in py-1"
      >
        <div class="px-4 py-2 border-b border-waldorf-cream-100">
          <p class="text-sm font-medium text-waldorf-gray-800">
            {{ authService.usuario()?.nomeCompleto }}
          </p>
          <p class="text-xs text-waldorf-gray-500">
            {{ authService.usuario()?.email }}
          </p>
        </div>
        <a routerLink="/perfil"
           (click)="menuUsuarioAberto.set(false)"
           class="flex items-center gap-2 px-4 py-2 text-sm text-waldorf-gray-600
                  hover:bg-waldorf-cream-50 hover:text-waldorf-gray-800 transition-colors">
          <span class="material-icons text-base">manage_accounts</span>
          Meu Perfil
        </a>
        <button
          (click)="logout()"
          class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-600
                 hover:bg-red-50 hover:text-red-700 transition-colors"
        >
          <span class="material-icons text-base">logout</span>
          Sair
        </button>
      </div>
    </div>
  </div>
</div>
