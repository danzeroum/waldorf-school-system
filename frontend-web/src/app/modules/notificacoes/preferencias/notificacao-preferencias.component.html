<div class="space-y-6 animate-fade-in-up max-w-lg">
  <div>
    <h1 class="text-2xl font-serif text-waldorf-gray-900">Preferências de Notificação</h1>
    <p class="text-sm text-waldorf-gray-500 mt-1">Escolha como e quando deseja ser notificado.</p>
  </div>

  <div *ngIf="carregando()" class="card animate-pulse space-y-3">
    <div class="skeleton h-5 w-1/3"></div>
    <div class="skeleton h-4 w-full"></div>
    <div class="skeleton h-4 w-3/4"></div>
  </div>

  <form *ngIf="!carregando()" [formGroup]="form" (ngSubmit)="salvar()" class="space-y-6">

    <div class="card space-y-4">
      <h2 class="text-sm font-semibold text-waldorf-gray-700 uppercase tracking-wide">Canais</h2>
      <label class="flex items-center justify-between">
        <span class="text-sm text-waldorf-gray-700">E-mail</span>
        <input type="checkbox" formControlName="email" class="toggle" />
      </label>
      <label class="flex items-center justify-between">
        <span class="text-sm text-waldorf-gray-700">Notificação no sistema (in-app)</span>
        <input type="checkbox" formControlName="inApp" class="toggle" />
      </label>
      <label class="flex items-center justify-between">
        <span class="text-sm text-waldorf-gray-700">Push (mobile)</span>
        <input type="checkbox" formControlName="push" class="toggle" />
      </label>
      <label class="flex items-center justify-between">
        <span class="text-sm text-waldorf-gray-700">SMS</span>
        <input type="checkbox" formControlName="sms" class="toggle" />
      </label>
    </div>

    <div class="card space-y-3">
      <h2 class="text-sm font-semibold text-waldorf-gray-700 uppercase tracking-wide">Frequência</h2>
      <select formControlName="agregacao" class="input w-full">
        <option value="IMEDIATO">Imediato</option>
        <option value="RESUMO_DIARIO">Resumo diário</option>
        <option value="RESUMO_SEMANAL">Resumo semanal</option>
      </select>
    </div>

    <div class="card space-y-3">
      <h2 class="text-sm font-semibold text-waldorf-gray-700 uppercase tracking-wide">Horário de Silêncio</h2>
      <div class="flex gap-4">
        <div class="flex-1">
          <label class="text-xs text-waldorf-gray-500 mb-1 block">Início</label>
          <input type="time" formControlName="silencioInicio" class="input w-full" />
        </div>
        <div class="flex-1">
          <label class="text-xs text-waldorf-gray-500 mb-1 block">Fim</label>
          <input type="time" formControlName="silencioFim" class="input w-full" />
        </div>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <button type="submit" [disabled]="salvando()" class="btn-primary flex items-center gap-2">
        <span *ngIf="salvando()" class="material-icons animate-spin text-base">refresh</span>
        Salvar preferências
      </button>
      <span *ngIf="salvo()" class="text-sm text-green-600 flex items-center gap-1">
        <span class="material-icons text-base">check_circle</span> Salvo!
      </span>
    </div>
  </form>
</div>
