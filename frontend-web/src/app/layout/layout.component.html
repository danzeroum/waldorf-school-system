<div class="flex h-screen overflow-hidden bg-waldorf-cream-50">

  <!-- Sidebar -->
  <wld-sidebar [aberta]="sidebarAberta()" (fechar)="sidebarAberta.set(false)"></wld-sidebar>

  <!-- Overlay mobile -->
  <div *ngIf="sidebarAberta()" class="fixed inset-0 bg-black/40 z-20 lg:hidden"
       (click)="sidebarAberta.set(false)"></div>

  <!-- Área principal -->
  <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
    <wld-header (menuToggle)="sidebarAberta.set(!sidebarAberta())"></wld-header>

    <main class="flex-1 overflow-y-auto p-4 sm:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- Componentes globais de UX -->
<wld-toast></wld-toast>
<wld-loading-overlay></wld-loading-overlay>
