name: waldorf_mobile
description: Aplicativo móvel do Sistema Escolar Waldorf para pais e responsáveis.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegação
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Armazenamento local
  sqflite: ^2.3.3
  path: ^1.9.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Auth JWT
  jwt_decoder: ^2.0.1

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Push Notifications
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.1

  # Utilitários
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  connectivity_plus: ^6.0.3
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: WaldorfSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSans-SemiBold.ttf
          weight: 600
